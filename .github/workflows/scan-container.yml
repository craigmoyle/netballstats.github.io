name: Scan container image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.azure'
      - 'api/**'
      - 'R/**'
      - 'renv.lock'
  pull_request:
    paths:
      - 'Dockerfile.azure'
      - 'api/**'
      - 'R/**'
      - 'renv.lock'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      # Pin first-party actions by commit SHA to guard against mutable-tag abuse.
      # actions/checkout v6 — https://github.com/actions/checkout/commits/v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build image
        run: docker build -f Dockerfile.azure -t netballstats-api:scan .

      # Install Trivy directly from GitHub Releases instead of via a third-party
      # GitHub Action. The aquasecurity/trivy-action and setup-trivy actions were
      # compromised in the March 2026 supply-chain incident; even pinned version
      # tags were force-pushed. Owning the install step removes that attack surface.
      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.69.3"
          TRIVY_SHA256: "1816b632dfe529869c740c0913e36bd1629cb7688bd5634f4a858c1d57c88b75"
        run: |
          curl -sLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          echo "${TRIVY_SHA256}  trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" | sha256sum -c -
          tar xzf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy
          sudo mv trivy /usr/local/bin/trivy

      - name: Run Trivy vulnerability scanner
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --ignorefile .trivyignore \
            --skip-files '**/openssl/*/doc/keys.html' \
            netballstats-api:scan

      # github/codeql-action is a first-party GitHub action; pinned by commit SHA.
      # v4 tag object d4b3ca9 → commit c10b806
      # https://github.com/github/codeql-action/commits/v4
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
        if: always()
        with:
          sarif_file: trivy-results.sarif

