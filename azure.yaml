name: netballstats
metadata:
  template: netballstats-azure-postgres@0.1.0
infra:
  provider: bicep
  path: infra
  module: main
hooks:
  postdeploy:
    shell: sh
    run: |
      # After deploying the API, sync the refresh job images to match.
      # DB_REFRESH_JOB_SAT_NAME and DB_REFRESH_JOB_SUN_NAME come from
      # Bicep outputs, surfaced as env vars by azd.
      # Uses az rest (not az containerapp job update) to avoid the extension
      # hardcoding an unsupported API version.
      # AZURE_RESOURCE_GROUP is not exported by azd; fall back to the known value.
      RG="${AZURE_RESOURCE_GROUP:-rg-netballstats-audljf}"
      API_IMAGE=$(az rest \
        --method get \
        --url "https://management.azure.com/subscriptions/$AZURE_SUBSCRIPTION_ID/resourceGroups/$RG/providers/Microsoft.App/containerApps?api-version=2024-03-01" \
        --query "value[?tags.\"azd-service-name\"=='api'].properties.template.containers[0].image | [0]" \
        --output tsv)
      BODY="{\"properties\":{\"template\":{\"containers\":[{\"image\":\"$API_IMAGE\",\"name\":\"main\"}]}}}"
      az rest \
        --method patch \
        --url "https://management.azure.com/subscriptions/$AZURE_SUBSCRIPTION_ID/resourceGroups/$RG/providers/Microsoft.App/jobs/$DB_REFRESH_JOB_SAT_NAME?api-version=2025-01-01" \
        --body "$BODY"
      az rest \
        --method patch \
        --url "https://management.azure.com/subscriptions/$AZURE_SUBSCRIPTION_ID/resourceGroups/$RG/providers/Microsoft.App/jobs/$DB_REFRESH_JOB_SUN_NAME?api-version=2025-01-01" \
        --body "$BODY"
services:
  web:
    project: .
    dist: dist
    language: js
    host: staticwebapp
    module: modules/app-stack
  api:
    project: .
    language: js
    host: containerapp
    module: modules/app-stack
    docker:
      path: ./Dockerfile.azure
      context: .
      registry: ${AZURE_CONTAINER_REGISTRY_ENDPOINT}
      platform: linux/amd64
      remoteBuild: true
    apiVersion: 2025-07-01
