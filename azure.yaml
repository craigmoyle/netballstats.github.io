name: netballstats
metadata:
  template: netballstats-azure-postgres@0.1.0
infra:
  provider: bicep
  path: infra
  module: main
hooks:
  postdeploy:
    shell: sh
    run: |
      # After deploying the API, sync the refresh job images to match.
      # Discover job names from the resource group rather than relying on
      # Bicep outputs (which may not be present in .env after partial deploys).
      RG="${AZURE_RESOURCE_GROUP:-rg-netballstats-audljf}"
      API_IMAGE=$(az rest \
        --method get \
        --url "https://management.azure.com/subscriptions/$AZURE_SUBSCRIPTION_ID/resourceGroups/$RG/providers/Microsoft.App/containerApps?api-version=2024-03-01" \
        --query "value[?tags.\"azd-service-name\"=='api'].properties.template.containers[0].image | [0]" \
        --output tsv)
      SAT_JOB=$(az containerapp job list \
        --subscription "$AZURE_SUBSCRIPTION_ID" \
        --resource-group "$RG" \
        --query "[?contains(name, '-db-sat-')].name | [0]" \
        --output tsv)
      SAT_CONTAINER=$(az containerapp job show \
        --subscription "$AZURE_SUBSCRIPTION_ID" \
        --resource-group "$RG" \
        --name "$SAT_JOB" \
        --query "properties.template.containers[0].name" \
        --output tsv)
      SUN_JOB=$(az containerapp job list \
        --subscription "$AZURE_SUBSCRIPTION_ID" \
        --resource-group "$RG" \
        --query "[?contains(name, '-db-sun-')].name | [0]" \
        --output tsv)
      SUN_CONTAINER=$(az containerapp job show \
        --subscription "$AZURE_SUBSCRIPTION_ID" \
        --resource-group "$RG" \
        --name "$SUN_JOB" \
        --query "properties.template.containers[0].name" \
        --output tsv)
      
      # Update both jobs' container images in parallel (background)
      az containerapp job update \
        --subscription "$AZURE_SUBSCRIPTION_ID" \
        --name "$SAT_JOB" \
        --resource-group "$RG" \
        --image "$API_IMAGE" \
        --container-name "$SAT_CONTAINER" \
        --no-wait &
      az containerapp job update \
        --subscription "$AZURE_SUBSCRIPTION_ID" \
        --name "$SUN_JOB" \
        --resource-group "$RG" \
        --image "$API_IMAGE" \
        --container-name "$SUN_CONTAINER" \
        --no-wait &
      
      # Only trigger DB refresh if R code was modified (check for R files in git diff)
      # Skip DB refresh on frontend-only deployments to save ~2 minutes
      if git diff --name-only HEAD~1 HEAD | grep -qE '\.(R|r)$|renv\.lock|scripts/build_database'; then
        echo "R code detected in commit. Triggering DB refresh..."
        wait  # Wait for job updates to complete before triggering refresh
        az containerapp job start \
          --subscription "$AZURE_SUBSCRIPTION_ID" \
          --name "$SAT_JOB" \
          --resource-group "$RG" \
          --no-wait || true
      else
        echo "Frontend-only deploy. Skipping DB refresh."
      fi
services:
  web:
    project: .
    dist: dist
    language: js
    host: staticwebapp
    module: modules/app-stack
  api:
    project: .
    language: js
    host: containerapp
    module: modules/app-stack
    docker:
      path: ./Dockerfile.azure
      context: .
      registry: ${AZURE_CONTAINER_REGISTRY_ENDPOINT}
      platform: linux/amd64
      remoteBuild: true
    apiVersion: 2025-07-01
