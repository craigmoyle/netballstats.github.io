<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="/assets/theme.js"></script>
    <title>Player Profiles | Netball Stats Database</title>
    <meta name="description" content="Browse Super Netball player profiles with games played, career summaries, and season-by-season statistics.">
    <link rel="preload" href="/assets/fonts/fraunces-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/assets/fonts/teko-600-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/assets/styles.css">
    <script defer src="/assets/config.js"></script>
    <script defer src="/assets/players.js"></script>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <div class="page-backdrop" aria-hidden="true">
      <div class="backdrop-glow backdrop-glow--one"></div>
      <div class="backdrop-glow backdrop-glow--two"></div>
      <div class="backdrop-grid"></div>
    </div>

    <header class="page-shell hero-shell reveal">
      <nav class="page-nav" aria-label="Player profile navigation">
        <a class="page-nav__link" href="/">Back to explorer</a>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Switch to light theme">☀</button>
      </nav>

      <section class="hero-panel">
        <div class="hero-copy">
          <p class="eyebrow">Player profiles</p>
          <h1>Player directory</h1>

        </div>

        <aside class="hero-aside" aria-label="Player directory status">
          <div class="hero-aside__card">
            <span class="hero-aside__label">Directory size</span>
            <strong id="directory-total">Loading</strong>
            <p id="directory-summary">Fetching player records and career spans from the API.</p>
          </div>
        </aside>
      </section>
    </header>

    <main id="main-content" class="page-shell page-main">
      <section class="panel reveal">
        <div id="directory-status" class="status-banner" role="status" aria-live="polite" hidden></div>
        <div class="panel__heading panel__heading--split">
          <div>
            <h2>Player directory</h2>
          </div>
          <p id="directory-results-meta" class="directory-results-meta">Loading players…</p>
        </div>

        <div class="field directory-search">
          <label for="directory-search-input">Find a player</label>
          <input id="directory-search-input" type="search" placeholder="Search by player name">
        </div>
      </section>

      <section class="panel reveal">
        <div id="directory-grid" class="directory-grid" aria-live="polite"></div>
      </section>
    </main>
  </body>
</html>
