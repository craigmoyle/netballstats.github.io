services:
  - type: web
    name: netballstats-api
    runtime: docker
    plan: starter
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NETBALL_STATS_REPO_ROOT
        value: /opt/render/project/src
      - key: NETBALL_STATS_HOST
        value: 0.0.0.0
      - key: NETBALL_STATS_PORT
        value: "10000"
      - key: NETBALL_STATS_ALLOWED_ORIGINS
        sync: false
      - key: NETBALL_STATS_RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: NETBALL_STATS_RATE_LIMIT_MAX_REQUESTS
        value: "60"
